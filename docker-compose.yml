services:
  app:
    build:
      context: .
      args:
        NODE_ENV: production
    container_name: biko_front
    restart: unless-stopped
    ports:
      - "3005:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_BASE_URL=https://biko-api.byissa.dev/api
      - API_BASE_URL=https://biko-api.byissa.dev/api