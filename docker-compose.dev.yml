services:
  app:
    build:
      context: .
      args:
        NODE_ENV: development
    container_name: biko_front
    restart: unless-stopped
    ports:
      - "3005:3000"
    env_file:
      - .env.local
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
